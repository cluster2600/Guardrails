models:
  - type: main
    engine: nim
    model: meta/llama-3.3-70b-instruct

  - type: content_safety
    engine: nim
    model: nvidia/llama-3.1-nemoguard-8b-content-safety
    # Model-specific cache configuration (optional)
    cache:
      enabled: true
      capacity_per_model: 50000 # Larger cache for primary model
      stats:
        enabled: true
        log_interval: 60.0 # Log stats every minute

rails:
  input:
    flows:
      # You can use multiple content safety models
      - content safety check input $model=content_safety
  output:
    flows:
      - content safety check output $model=content_safety
