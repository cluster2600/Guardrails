models:
  - type: main
    engine: nim
    model: meta/llama-3.3-70b-instruct

  - type: content_safety
    engine: nim
    model: nvidia/llama-3.1-nemoguard-8b-content-safety

rails:
  input:
    flows:
      - content safety check input $model=content_safety
  output:
    flows:
      - content safety check output $model=content_safety

  # Content safety cache configuration with persistence and stats
  config:
    content_safety:
      cache:
        enabled: true
        capacity_per_model: 5000
        store: memory # In-memory cache with optional disk persistence
        persistence:
          enabled: true # Enable persistence (requires interval to be set)
          interval: 300.0 # Persist every 5 minutes
          path: ./content_safety_cache.json # Where to save cache
        stats:
          enabled: true # Enable statistics tracking
          log_interval: 60.0 # Log cache statistics every minute
