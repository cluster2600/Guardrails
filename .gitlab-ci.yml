# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/ee/user/application_security/secret_detection/#customizing-settings
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
stages:
    - tests
    - build
    - docker-test
    - deploy
    - doc-improvement
sast:
    stage: tests
include:
    - template: Security/SAST.gitlab-ci.yml
    - project: "sw-gpu-doctools/docs-ci"
      ref: main
      file: "nemo-guardrails-toolkit/docs-ci.yaml"

variables:
    PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.cache/pip"
    POETRY_VERSION: "1.8.2"
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    LATEST_TAG: $CI_REGISTRY_IMAGE:latest

cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
        - .venv/
        - .cache/pip
        - poetry.lock
        - pyproject.toml

# Jobs templates

.install-deps-template: &install-deps
    before_script:
        - pip install poetry==$POETRY_VERSION
        - poetry --version
        - poetry config virtualenvs.in-project true
        - poetry install --extras all --with dev

.test-template: &test
    <<: *install-deps
    stage: tests
    coverage: /(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
    script: make test

# Tests jobs

python3.10:
    <<: *test
    image: python:3.10

python3.11:
    <<: *test
    image: python:3.11

python3.12:
    <<: *test
    image: python:3.12

python3.13:
    <<: *test
    image: python:3.13

# Build job
build:
    stage: build
    image: docker:19.03.12
    services:
        - docker:19.03.12-dind
    variables:
        DOCKER_DRIVER: overlay2
        DOCKER_TLS_CERTDIR: "/certs"
    before_script:
        - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    script:
        - docker build -t $IMAGE_TAG -f ./qa/Dockerfile.qa .
        - docker push $IMAGE_TAG
    only:
        - tags
    tags:
        - gitlab-runner-bignlp-api

# Docker test job
docker-test:
    stage: docker-test
    image: docker:19.03.12
    services:
        - docker:19.03.12-dind
    before_script:
        - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    script:
        - docker pull $IMAGE_TAG
        - docker run --rm $IMAGE_TAG pytest || (docker rmi $IMAGE_TAG && exit 1)
    only:
        - tags

    tags:
        - gitlab-runner-bignlp-api

# =============================================================================
# Documentation Self-Improvement Agent
# =============================================================================
# These jobs run the documentation improvement agent to automatically
# detect when code changes require documentation updates.

# Reusable setup for doc improvement agent
.doc-agent-setup: &doc-agent-setup
    image: python:3.12
    before_script:
        - pip install pyyaml
    variables:
        GITHUB_TOKEN: "$GITHUB_TOKEN"
        GITLAB_TOKEN: "$CI_JOB_TOKEN"

# Run doc improvement agent on merge to develop
doc-improvement:on-merge:
    <<: *doc-agent-setup
    stage: doc-improvement
    script:
        - echo "🔍 Running Documentation Self-Improvement Agent"
        - python -m agents.doc_improvement_agent --ci --base-ref origin/develop
    artifacts:
        paths:
            - .dori/reports/
        expire_in: 1 week
    rules:
        # Run after merge to develop
        - if: $CI_COMMIT_BRANCH == "develop"
          when: on_success
    allow_failure: true

# Run doc improvement check on MRs (dry run, no PR creation)
doc-improvement:check:
    <<: *doc-agent-setup
    stage: doc-improvement
    script:
        - echo "🔍 Checking documentation impact for MR"
        - python -m agents.doc_improvement_agent --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME --dry-run
    rules:
        - if: $CI_MERGE_REQUEST_IID
    allow_failure: true

# Scheduled full documentation scan (weekly)
doc-improvement:scheduled:
    <<: *doc-agent-setup
    stage: doc-improvement
    script:
        - echo "📚 Running scheduled documentation scan"
        - python -m agents.doc_improvement_agent --scheduled
    artifacts:
        paths:
            - .dori/reports/
        expire_in: 1 month
    rules:
        - if: $CI_PIPELINE_SOURCE == "schedule"
    allow_failure: true
